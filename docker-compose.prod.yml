services:

  caddy:
    image: caddy:2-alpine
    container_name: pointe-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [pointe-net]
    restart: unless-stopped

  backend:
    image: ghcr.io/pointe-dev/pointe.dev:latest
    container_name: pointe-backend
    environment:
      RUST_LOG: info
      BIND_ADDR: "0.0.0.0:3001"
      N8N_URL: "http://n8n:5678"
      QDRANT_URL: "http://qdrant:6333"
    env_file: .env.prod
    volumes:
      - model_cache:/root/.cache       # persists BGE-M3 download (~300 MB)
      - fastembed_cache:/app/.fastembed_cache  # persists multilingual-e5-large (~2.1 GB)
    networks: [pointe-net]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      n8n:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: pointe-postgres
    environment:
      POSTGRES_USER: pointe
      POSTGRES_DB: pointe
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets: [pg_password]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [pointe-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pointe"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: pointe-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    networks: [pointe-net]
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: pointe-n8n
    environment:
      N8N_HOST: n8n.pointe.dev
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.pointe.dev/
      GENERIC_TIMEZONE: Europe/Paris
      N8N_METRICS: "false"
    env_file: .env.n8n
    volumes:
      - n8n_data:/home/node/.n8n
    networks: [pointe-net]
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    container_name: pointe-clickhouse
    env_file: .env.langfuse
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
    networks: [pointe-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: pointe-redis
    volumes:
      - redis_data:/data
    networks: [pointe-net]
    restart: unless-stopped

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: pointe-langfuse-web
    env_file: .env.langfuse
    environment:
      NODE_ENV: production
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      NEXTAUTH_URL: https://langfuse.pointe.dev
      LANGFUSE_INIT_ORG_NAME: pointe
      LANGFUSE_INIT_PROJECT_NAME: pointe-dev
    networks: [pointe-net]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_started

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: pointe-langfuse-worker
    env_file: .env.langfuse
    environment:
      NODE_ENV: production
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    networks: [pointe-net]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_started

networks:
  pointe-net:
    driver: bridge

secrets:
  pg_password:
    file: ./secrets/pg_password.txt

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  qdrant_data:
  n8n_data:
  model_cache:
  fastembed_cache:
  clickhouse_data:
  redis_data:
