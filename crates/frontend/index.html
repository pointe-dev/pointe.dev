<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="High-end AI agency turning complex engineering into effortless elegance.">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com;">
    <title>pointe.dev — Automatisation pointue.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        body { font-family: 'Ubuntu', sans-serif; font-weight: 400; }
        h1, h2, h3, h4, h5, h6 { font-weight: 500; }
        strong, .font-bold { font-weight: 700; }
        /* Mermaid SVG responsive */
        #mermaid-canvas svg {
            width: 100% !important;
            height: auto !important;
            max-width: 100%;
            display: block;
        }
        #mermaid-canvas .node rect,
        #mermaid-canvas .node circle,
        #mermaid-canvas .node polygon {
            rx: 8px;
            ry: 8px;
        }
    </style>
    <!-- Mermaid for workflow diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        const isDark = document.documentElement.classList.contains('dark') ||
            window.matchMedia('(prefers-color-scheme: dark)').matches;

        mermaid.initialize({
            startOnLoad: false,
            theme: 'base',
            themeVariables: {
                primaryColor: isDark ? '#1a1a1a' : '#ffffff',
                primaryBorderColor: isDark ? '#374151' : '#e5e7eb',
                primaryTextColor: isDark ? '#f3f4f6' : '#111827',
                lineColor: '#dc2626',
                secondaryColor: isDark ? '#1f1f1f' : '#fff1f2',
                tertiaryColor: isDark ? '#111111' : '#f9fafb',
                edgeLabelBackground: isDark ? '#1a1a1a' : '#ffffff',
                fontFamily: "'Ubuntu', sans-serif",
                fontSize: '13px',
                nodeSpacing: 40,
                rankSpacing: 50,
            },
            flowchart: { curve: 'monotoneY', padding: 20, useMaxWidth: true },
            securityLevel: 'loose'
        });

        async function renderMermaidTo(code, elementId) {
            try {
                const id = 'mg-' + Math.random().toString(36).substr(2, 8);
                const { svg } = await mermaid.render(id, code);
                const el = document.getElementById(elementId);
                if (el) el.innerHTML = svg;
            } catch(e) {
                console.warn('Mermaid render error:', e);
            }
        }
    </script>
</head>
<body class="bg-black text-white">
    <div id="app"></div>
    <script type="module">
        import('/pkg/frontend.js').then(m => {
            if (m.default) m.default().catch(console.error);
            else if (m.init) m.init().catch(console.error);
        }).catch(console.error);
    </script>
</body>
</html>
