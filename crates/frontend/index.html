<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Confiez vos tâches répétitives à des collaborateurs IA conçus sur mesure. Vous gardez le pilotage, ils font le reste — et vous gagnez du temps comme de l'argent.">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://api.fontshare.com https://cdn.fontshare.com; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.fontshare.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com https://cdn.fontshare.com;">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <!-- favicon.png (PNG fallback) intentionally not referenced: it still holds the
         old "p" mark. Regenerate it from favicon.svg (red triangle) to restore a
         PNG fallback for browsers without SVG-favicon support. -->
    <title>pointe.dev — Automatisation pointue.</title>
    <meta name="google-site-verification" content="_hrXuvyh2YxuAhbyxbD2-OTfIgJxivGJF64lOuBWzwA">
    <meta name="robots" content="index, follow">
    <!-- Canonical — this app's public home is go.pointe.dev (the apex pointe.dev is a
         separate portal that will list projects). All SEO URLs point here. -->
    <link rel="canonical" href="https://go.pointe.dev/">
    <!-- Multilingual: the app serves FR/EN/DE off the same URL (client-side i18n).
         hreflang tells Google the language variants share this canonical. -->
    <link rel="alternate" hreflang="fr" href="https://go.pointe.dev/">
    <link rel="alternate" hreflang="en" href="https://go.pointe.dev/">
    <link rel="alternate" hreflang="de" href="https://go.pointe.dev/">
    <link rel="alternate" hreflang="x-default" href="https://go.pointe.dev/">
    <!-- Social sharing (Open Graph + Twitter). Static so crawlers that don't run JS
         see them — this is a CSR/WASM app. og.png is a 1200×630 card rasterised from
         og.svg (source in this dir); crawlers ignore SVG og:image, hence the PNG. -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="pointe.dev">
    <meta property="og:locale" content="fr_FR">
    <meta property="og:locale:alternate" content="en_US">
    <meta property="og:locale:alternate" content="de_DE">
    <meta property="og:url" content="https://go.pointe.dev/">
    <meta property="og:title" content="pointe.dev — Automatisation pointue.">
    <meta property="og:description" content="Confiez vos tâches répétitives à des collaborateurs IA conçus sur mesure. Vous gardez le pilotage, ils font le reste — et vous gagnez du temps comme de l'argent.">
    <meta property="og:image" content="https://go.pointe.dev/og.png">
    <meta property="og:image:secure_url" content="https://go.pointe.dev/og.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="pointe.dev — Déléguez ce qui vous pèse. Automatisation pointue.">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="pointe.dev — Automatisation pointue.">
    <meta name="twitter:description" content="Confiez vos tâches répétitives à des collaborateurs IA conçus sur mesure. Vous gardez le pilotage, ils font le reste — et vous gagnez du temps comme de l'argent.">
    <meta name="twitter:image" content="https://go.pointe.dev/og.png">
    <meta name="twitter:image:alt" content="pointe.dev — Déléguez ce qui vous pèse. Automatisation pointue.">
    <meta name="theme-color" content="#0f0c10">
    <!-- Structured data (static for crawlers). Organization carries the logo Google
         shows in search; WebSite/WebApplication scopes this project to go.pointe.dev. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://pointe.dev/#organization",
          "name": "pointe.dev",
          "url": "https://pointe.dev/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://go.pointe.dev/logo.png",
            "width": 512,
            "height": 512
          },
          "sameAs": []
        },
        {
          "@type": "WebSite",
          "@id": "https://go.pointe.dev/#website",
          "url": "https://go.pointe.dev/",
          "name": "pointe.dev — Automatisation pointue.",
          "inLanguage": ["fr", "en", "de"],
          "publisher": { "@id": "https://pointe.dev/#organization" }
        },
        {
          "@type": "WebApplication",
          "name": "pointe.dev",
          "url": "https://go.pointe.dev/",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "description": "Confiez vos tâches répétitives à des collaborateurs IA conçus sur mesure. Vous gardez le pilotage, ils font le reste.",
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" },
          "publisher": { "@id": "https://pointe.dev/#organization" }
        }
      ]
    }
    </script>
    <!-- Critical CSS and WASM preloads — start fetching before parser hits the script -->
    <link rel="preload" href="/pkg/frontend_bg.wasm" as="fetch" crossorigin>
    <link rel="modulepreload" href="/pkg/frontend.js">
    <link rel="stylesheet" href="/styles.css">
    <!-- Fonts: non-blocking — content renders with system fonts first, swaps in -->
    <link rel="preconnect" href="https://api.fontshare.com">
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin>
    <link rel="preload" href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=satoshi@400,500,700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=satoshi@400,500,700&display=swap"></noscript>
    <style>
        body { font-family: 'Satoshi', system-ui, sans-serif; font-weight: 400; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Clash Display', system-ui, sans-serif; font-weight: 600; }
        strong, .font-bold { font-weight: 700; }
        /* LCP placeholder: a single brand-crimson dot, gently pulsing, shown until
           WASM mounts. Lightweight first paint, no flash of soon-to-be-replaced text. */
        @keyframes pointe-pulse {
            0%, 100% { transform: scale(1);   opacity: 1; }
            50%      { transform: scale(0.7); opacity: 0.55; }
        }
        @media (prefers-reduced-motion: reduce) {
            #pointe-dot { animation: none !important; }
        }
    </style>
</head>
<body class="bg-black text-white">
    <div id="app">
        <!-- LCP placeholder — paints immediately (before WASM downloads) as a single
             brand-crimson dot. Leptos removes #app-skeleton on mount and renders the
             real hero. Inline dark background avoids a light→dark flash. -->
        <div id="app-skeleton" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f0c10;">
            <span id="pointe-dot" style="width:1rem;height:1rem;border-radius:50%;background:#e8163c;box-shadow:0 0 24px 4px rgba(232,22,60,0.45);animation:pointe-pulse 1.4s ease-in-out infinite;display:inline-block;"></span>
        </div>
    </div>
    <script type="module">
        import('/pkg/frontend.js').then(m => {
            if (m.default) m.default().catch(console.error);
            else if (m.init) m.init().catch(console.error);
        }).catch(console.error);
    </script>
</body>
</html>
