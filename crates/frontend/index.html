<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="High-end AI agency turning complex engineering into effortless elegance.">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://api.fontshare.com https://cdn.fontshare.com; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.fontshare.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com https://cdn.fontshare.com;">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <title>pointe.dev — Automatisation pointue.</title>
    <!-- Critical CSS and WASM preloads — start fetching before parser hits the script -->
    <link rel="preload" href="/pkg/frontend_bg.wasm" as="fetch" crossorigin>
    <link rel="modulepreload" href="/pkg/frontend.js">
    <link rel="stylesheet" href="/styles.css">
    <!-- Fonts: non-blocking — content renders with system fonts first, swaps in -->
    <link rel="preconnect" href="https://api.fontshare.com">
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin>
    <link rel="preload" href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=satoshi@400,500,700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=satoshi@400,500,700&display=swap"></noscript>
    <style>
        body { font-family: 'Satoshi', system-ui, sans-serif; font-weight: 400; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Clash Display', system-ui, sans-serif; font-weight: 600; }
        strong, .font-bold { font-weight: 700; }
    </style>
</head>
<body class="bg-black text-white">
    <div id="app">
        <!-- Static LCP hero — paints immediately with the loaded stylesheet, before
             WASM downloads. Leptos removes #app-skeleton on mount and renders the
             interactive hero. Inline dark colors (no theme-dependent classes) avoid a
             light→dark flash, and no opacity:0 entrance so the H1 is a real first paint. -->
        <div id="app-skeleton" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:5rem 1.5rem;background:#0f0c10;">
            <span style="display:inline-flex;align-items:center;gap:0.5rem;padding:0.5rem 1rem;margin-bottom:2.5rem;border-radius:999px;background:rgba(232,22,60,0.1);border:1px solid rgba(232,22,60,0.25);color:#f87171;font-size:0.75rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;">
                <span style="width:0.5rem;height:0.5rem;border-radius:50%;background:#ef4444;display:inline-block;"></span>
                Agence IA
            </span>
            <h1 style="font-family:'Clash Display',system-ui,sans-serif;font-weight:700;letter-spacing:-0.02em;line-height:1;margin:0 0 0.25em;max-width:64rem;">
                <span style="display:block;font-size:clamp(3rem,8vw,4.5rem);background:linear-gradient(135deg,#f1f5f9 0%,#e8163c 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;">
                    Déléguez ce qui vous pèse.
                </span>
                <span style="display:block;font-size:clamp(3rem,8vw,4.5rem);color:#e8163c;margin-top:0.05em;">
                    Pour les fondateurs.
                </span>
            </h1>
            <p style="font-size:clamp(1.25rem,2.5vw,1.5rem);color:#94a3b8;font-weight:300;line-height:1.6;margin:2rem auto 0;max-width:42rem;">
                Confiez vos tâches répétitives à des collaborateurs IA conçus sur mesure. Vous gardez le pilotage, ils font le reste — et vous gagnez du temps comme de l'argent.
            </p>
        </div>
    </div>
    <script type="module">
        import('/pkg/frontend.js').then(m => {
            if (m.default) m.default().catch(console.error);
            else if (m.init) m.init().catch(console.error);
        }).catch(console.error);
    </script>
</body>
</html>
