[package]
name = "frontend"
version.workspace = true
edition.workspace = true
authors.workspace = true

[dependencies]
leptos = { version = "0.6", features = ["hydrate"] }
leptos_meta = "0.6"
leptos_router = "0.6"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

shared = { path = "../shared" }

[lib]
crate-type = ["cdylib"]
