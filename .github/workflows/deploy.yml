name: Build & Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types:
      - completed
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # The deployable image is built once by CI (ci.yml → build-docker), which pushes
  # `latest` + `sha-<sha>` to GHCR. This workflow only pulls & restarts — no rebuild.
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            # Pull latest backend image
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/pointe
            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d --no-deps backend
            # Clean up old images
            docker image prune -f
            echo "✅ Deployed sha-${{ github.sha }}"

  # ── Post-deploy E2E smoke (against live prod) ─────────────────────────────────
  # Runs AFTER deploy so it validates the freshly-deployed prod, never gates it.
  smoke:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    name: E2E smoke (post-deploy)
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install Playwright dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: tests/e2e
        # Non-gating signal: this runs *after* deploy and only exercises live
        # prod. It currently fails on an intermittent Cloudflare 403 on /api/*
        # from the Actions datacenter IP (the WAF skip rule doesn't always
        # apply — edge config, tracked separately). Don't let that flake mark
        # the whole deploy red; the result + report stay visible on the step.
        continue-on-error: true
        env:
          BASE_URL: https://go.pointe.dev
          CI: "true"
          # Cloudflare WAF bypass header so /api/* calls aren't 403'd from the
          # Actions runner's datacenter IP. See tests/e2e/fixtures.ts.
          CI_BYPASS_TOKEN: ${{ secrets.CI_BYPASS_TOKEN }}
        run: npx playwright test --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

  # ── Post-deploy Lighthouse (non-blocking) ─────────────────────────────────────
  lighthouse:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    name: Lighthouse CI (post-deploy)
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install @lhci/cli
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        # Non-blocking: LCP is currently high due to WASM loading (~46s).
        # Scores are tracked as artifacts; thresholds tightened as perf improves.
        continue-on-error: true
        run: lhci autorun --config=lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7
