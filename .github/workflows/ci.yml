name: CI

# Separate from deploy.yml — this pipeline tests code quality and production health.
# Runs on every push/PR (not just main) so issues are caught before merge.
#
# Pipeline order:
#   unit tests → integration tests → build Docker → smoke tests → E2E → Lighthouse CI → coverage
#
# Smoke tests, E2E, and Lighthouse run against https://go.pointe.dev (production).
# Unit and integration tests run in isolation with no external dependencies.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Unit tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run unit tests (all workspace members)
        # ANTHROPIC_API_KEY must not be set — unit tests must not make real API calls.
        # The run_qualifier test uses a fake key and verifies the early-return path.
        run: cargo test --all --lib -- --test-threads=4

  # ── 2. Integration tests ──────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run integration tests
        run: cargo test -p backend --test integration

  # ── 3. Build Docker image ─────────────────────────────────────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: integration-tests
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build (no push on non-main branches)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. E2E tests (against production) ─────────────────────────────────────────
  # Smoke/API coverage: integration tests (axum-test). .hurl files in tests/smoke/
  # serve as API contract documentation only.
  e2e:
    name: E2E Tests (prod)
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install Playwright dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: tests/e2e
        env:
          BASE_URL: https://go.pointe.dev
          CI: "true"
          # Cloudflare WAF bypass header so /api/* calls aren't 403'd from the
          # Actions runner's datacenter IP. See playwright.config.ts.
          CI_BYPASS_TOKEN: ${{ secrets.CI_BYPASS_TOKEN }}
        run: npx playwright test --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

  # ── 6. Lighthouse CI (against production) ─────────────────────────────────────
  lighthouse:
    name: Lighthouse CI (prod)
    runs-on: ubuntu-latest
    needs: e2e
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install @lhci/cli
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        # Non-blocking: LCP is currently high due to WASM loading (~46s).
        # Scores are tracked as artifacts; thresholds tightened as perf improves.
        continue-on-error: true
        run: lhci autorun --config=lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7

  # ── 7. Coverage ────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage (tarpaulin)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-coverage-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Run tarpaulin coverage
        run: |
          cargo tarpaulin \
            --packages backend \
            --lib \
            --out Xml Html \
            --output-dir target/tarpaulin \
            --exclude-files "crates/backend/src/main.rs" \
            --exclude-files "crates/backend/src/handlers/*" \
            --exclude-files "crates/backend/src/embeddings.rs" \
            --exclude-files "crates/backend/src/langfuse.rs" \
            --exclude-files "crates/backend/src/qdrant.rs" \
            --exclude-files "crates/backend/src/lib.rs"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/tarpaulin/
          retention-days: 7
