name: CI

# Separate from deploy.yml — this pipeline validates the COMMIT (code correctness).
# Runs on every push/PR (not just main) so issues are caught before merge.
#
# Pipeline order:
#   unit tests → integration tests → build Docker → coverage
#
# All jobs run in isolation with no external dependencies, so a green CI means
# "this commit is safe to deploy". E2E and Lighthouse test the LIVE production
# app, so they moved to deploy.yml as POST-deploy smoke (they validate prod
# AFTER a deploy, never gate it — gating deploy on prod health was circular).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Unit tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run unit tests (all workspace members)
        # ANTHROPIC_API_KEY must not be set — unit tests must not make real API calls.
        # The run_qualifier test uses a fake key and verifies the early-return path.
        run: cargo test --all --lib -- --test-threads=4

  # ── 2. Integration tests ──────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run integration tests
        run: cargo test -p backend --test integration

  # ── 3. Build Docker image ─────────────────────────────────────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: integration-tests
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build (no push on non-main branches)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Coverage ────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage (tarpaulin)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-coverage-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Run tarpaulin coverage
        run: |
          cargo tarpaulin \
            --packages backend \
            --lib \
            --out Xml Html \
            --output-dir target/tarpaulin \
            --exclude-files "crates/backend/src/main.rs" \
            --exclude-files "crates/backend/src/handlers/*" \
            --exclude-files "crates/backend/src/embeddings.rs" \
            --exclude-files "crates/backend/src/langfuse.rs" \
            --exclude-files "crates/backend/src/qdrant.rs" \
            --exclude-files "crates/backend/src/lib.rs"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/tarpaulin/
          retention-days: 7
